<html>
    <head>
        <title> positioning is css</title>
        <style>
             div{
                right: 30px;
                border:1px solid red
            }
            div.absolute{
                right=30px
                border: 1px  solid red
            }
            div.relative{
                right=30px
                border: 1px  solid red

            }
            div.sticky{
                right=30px
                border: 1px  solid red
            }
            div.fixed{
                right=30px
                border: 1px  solid red
            }
        </style>
    </head>
    <body>
        <h2> 
            div with no position property
        </h2>

        <div>
            <div></div> with no position property
            <div class="sticky">div with sticky property</div>
            <div class="relative">div with relative position</div>
            <div class="absolute">div with absolute position</div>
        </div>
    </body>

</html>
