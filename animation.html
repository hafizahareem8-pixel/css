<html>
    <head>
        <title> animation colors</title>
        <style>
            @keyframes Example{
                0%{
                    background-color: orange;
                }
                25% { background-color: brown;}
                50% { background-color: blueviolet;}
                100%{ background-color: aqua;}
            }
            div{
                height: 400px; 
                width:500px;
                background-color: beige;
                animation-name: Example;
                animation-duration: 60s;
            }
        </style>
    </head>

    <body>
       <div>
        Welcome to Codingnal
       </div> 
    </body>
</html>
