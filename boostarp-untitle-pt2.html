<DOCTYPE html>

<html>

<head>

    <title>Bootstrap Example</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">

    </script>

</head>
<body>
    <h1 style="color:orange;text-align: center;">
        Codingnal
    </h1>
    <div class="container">
        <div class="card" style="width: 18rem;">
            <img class="card-img-top" src="https://t3.ftcdn.net/jpg/03/46/83/96/360_F_346839683_6nAPzbhpSkIpb8pmAwufkC7c5eD7wYws.jpg"" alt="card-img-top"> 
            <div class="card-body">
                <h5 class="card-title">user name</h5>
                <p class="card-text">passionate about programming</p>
                <a href="#" class="btn btn-primary">see profile</a>
                    
                
            </div>


        </div>
    </div>
    <h2>spinner</h2>
    <div class="spinner-border">

    </div>

    
        
        
    </div>
    <div class="container">
        <h2>Pagination </h2>
        <p> Fall in love with coding</p>
        <!-- Declare the pagination class -->
        <ul class="pagination">
    
            <!-- Declare the item in the group -->
            <li class="page-item">
    
                <!-- Declare the link of the item -->
                <a class="page-link" href="#">Previous</a>
            </li>
    
            <!-- Rest of the pagination items -->
            <li class="page-item">
                <a class="page-link" href="#">1</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">2</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">3</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#">Next</a>
            </li>
        </ul>
    </div>
    </body>


</body>
