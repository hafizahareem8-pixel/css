<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title> Css box model example</title>
        <style>
            .example{
                width: 200px;
                height: 100px;
                background-color: aqua;
                border:2px  solid blue; 
                margin: 20px;
                padding: 10px;}
                .example2{
                      width: 200px;
                height: 100px;
                background-color: rgb(194, 44, 111);
                border:2px  solid rgb(205, 161, 20); 
                margin: 20px;
                padding: 10px;

                }

            }
        </style>
    </head>
    <body>
        <h1> Box Model Example</h1>
        <hr>
        <p class="example"> My content Example</p>
        <hr style="width: 10% ;height: 10px; color: aqua;" >
        <p class="example2">My contetnt example</p>
        <hr style="width: 10%; height: 10px ; color: aqua;">
    </body>

</html>
