<html>
    <head>
        <title> positioning of text</title>
        <style>
            div{
                right: 30px;
                border:1px solid red
            }
            div.absolute{
                position:absolute;
                left: 20px;
                border: 3px solid black
            }
            div.relative{
                position: relative;
                left: 20px;
                border: 3px solid rgb(171, 179, 200)
            }
            div.sticky{
                position: sticky;
                left: 20px;
                border: 3px  solid aqua; width:100px;
                top:2px

            }
            div.fixed{
                position: fixed;
                left: 20px;
                border: 3px solid blue;
                width:100px ;
                top:2px
                


            }


            
                
            
        </style>
    </head>
    <body>
        <h2>positioning</h2>
        <div>
            div with no position property
        </div>
        <div class="sticky">div with sticky property</div>
        <div class="relative">div with relative position</div>
        <div class="absolute">div with absolute position</div>

        </div>

        </div>



        </div>
            
        





    </body>
</html>
