<html>
    <head>
        <title> text styling</title>
        <style>
            .text1{
                color:rgb(30, 84, 233);
                font-size: 40px;
                

            }
            .text2{
                color: brown;
                font-size: 30px;
            }
            div{
                height: 100px;
                width: 100px;
                background-color: aquamarine;
                border:1px solid black;
            }
            #myid{
                transform: rotateX(180deg)
            }
            h1{
                text-decoration: overline;
                text-transform: capitalize;
            }
            h2{
                text-decoration: underline;
                text-transform: uppercase;

            }
            h3{
                text-decoration: line-through;
                text-transform: lowercase;
            }

        </style>

    </head>
    
    
        
            
            
        
    
    <body>
        <p class="text1">this is a sample</p>

        <p class="text2">this is a eg</p>
        <div>
            I love coding
        </div>
        <br> <div id="myid">i love codingnal</div>
        <h1>codingnal</h1>
        <h2>codingnal</h2>
        <h3>codingnal</h3>
            
        
        
    </body>
</html>
